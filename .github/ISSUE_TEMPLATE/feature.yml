name: 機能要求・仕様変更
description: 新機能の追加または既存 spec への変更（大小問わず、変更はつねに新しい Issue を作成する）
title: "[機能]: "
body:
  - type: dropdown
    id: spec
    attributes:
      label: 対象 spec
      description: この変更が属する spec を選択してください。判断できない場合は「未定（後で判断）」を選択。
      options:
        - batch-edit-mode
        - daily-export
        - display-and-filter
        - menu-button
        - pwa-support
        - task-detail-panel
        - task-management-core
        - 新規 spec
        - 未定（後で判断）
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 背景・目的
      description: なぜこの変更が必要か
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 変更内容
      description: どのような変更を行うか（概要）
    validations:
      required: true
